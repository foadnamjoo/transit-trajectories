<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>HW2 – DS-4630 / CS-5630 / CS-6630 (LLM System Build)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">

  <!-- D3 v7 only -->
  <script src="https://d3js.org/d3.v7.min.js" defer></script>
  <script src="script.js" defer></script>
</head>
<body>
  <header class="top">
    <h1>Visualization for Data Science – HW2</h1>
    <p class="subtitle">System-level LLM build (Histogram · Line · Stacked Area · Scatter)</p>
  </header>

  <section class="controls" aria-label="Dataset and metric controls">
    <label for="dataset">Dataset:</label>
    <select id="dataset" name="dataset" aria-label="Choose dataset">
      <option value="route_a.csv" selected>Dataset 1 (Route A)</option>
      <option value="route_b.csv">Dataset 2 (Route B)</option>
      <option value="route_c.csv">Dataset 3 (Route C)</option>
      <option value="route_d.csv">Dataset 4 (Route D)</option>
    </select>

    <label for="metric">Metric:</label>
    <select id="metric" name="metric" aria-label="Choose metric">
      <option value="ridership" selected>ridership</option>
      <option value="on_time_pct">on_time_pct</option>
    </select>
  </section>

  <main class="grid">
    <section class="card">
      <h2>Histogram</h2>
      <div id="histogram"></div>
    </section>

    <section class="card">
      <h2>Line</h2>
      <div id="line"></div>
    </section>

    <section class="card">
      <h2>Stacked Area</h2>
      <div id="stacked"></div>
    </section>

    <section class="card">
      <h2>Scatter</h2>
      <div id="scatter"></div>
    </section>
  </main>
</body>
</html>
